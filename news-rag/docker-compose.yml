version: "3.9"

services:
  # ── Ollama (LLM + Embeddings) ──────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: news-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Qdrant (Vector Database) ───────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: news-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ── News RAG App ───────────────────────────────────────────
  app:
    build: .
    container_name: news-rag-app
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - qdrant
    environment:
      OLLAMA_HOST: http://ollama:11434
      QDRANT_HOST: http://qdrant:6333
      OLLAMA_CHAT_MODEL: qwen3:8b
      OLLAMA_EMBED_MODEL: nomic-embed-text
      INGEST_INTERVAL_MINUTES: 15
      LOG_LEVEL: INFO
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
